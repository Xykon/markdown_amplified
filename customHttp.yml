customHeaders:
  # Defence-in-depth security headers applied to every response.
  # The CSP is intentionally pragmatic: 'unsafe-inline' is required for
  # Next.js runtime, React inline styles, KaTeX and rehype-highlight.
  # Markdown content is also sanitized server-side via rehype-sanitize,
  # so the CSP exists as a second line of defence (script-src 'self'
  # blocks loading external <script src=...>, object-src 'none' blocks
  # plugins, frame-ancestors 'none' prevents click-jacking).
  - pattern: '**/*'
    headers:
      - key: Content-Security-Policy
        value: "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data: blob: https:; media-src 'self' data: blob:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self'; worker-src 'self' blob:"
      - key: X-Content-Type-Options
        value: 'nosniff'
      - key: X-Frame-Options
        value: 'DENY'
      - key: Referrer-Policy
        value: 'strict-origin-when-cross-origin'
      - key: Permissions-Policy
        value: 'camera=(), microphone=(), geolocation=(), payment=()'

  - pattern: '/asset/**'
    headers:
      - key: Cache-Control
        value: 'public, max-age=3600'
